server {
    server_name api.sicheng55.com;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.sicheng55.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sicheng55.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        if ($http_origin ~* ^https://(www\.)?sicheng55\.com$) {
            add_header Access-Control-Allow-Origin $http_origin always;
        }
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Vary Origin always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name api.sicheng55.com;
    return 301 https://$host$request_uri;
}
